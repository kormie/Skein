name: Feature request
description: Propose a change or addition.
title: "feat: "
labels: ["type/feature", "status/triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What do you want to happen?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope / notes
      description: Constraints, alternatives considered, or related links.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
