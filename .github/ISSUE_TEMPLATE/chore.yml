name: Chore / Task
description: Maintenance work — refactors, CI, docs, build, release engineering.
title: "chore: "
labels: ["type/chore", "status/triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What needs doing, and why?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: Risks / rollout notes
      description: Anything to be careful about?
    validations:
      required: false
