name: Bug report
description: Something is broken or incorrect.
title: "bug: "
labels: ["type/bug", "status/triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please include enough detail for someone else to reproduce.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run ...
        2. Compile ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Versions matter a lot for compiler/runtime bugs.
      placeholder: |
        - OS:
        - Elixir/Erlang:
        - Skein version/commit:
        - Command:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: shell
    validations:
      required: false
