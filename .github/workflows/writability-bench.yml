# LIVE runs of the agent-writability benchmark (#320) — scheduled + on-demand.
#
# CI and release-readiness run the benchmark in replay mode (deterministic,
# no LLM calls — bench_replay_test.exs and the release-readiness workflow).
# This workflow is the path that actually calls the Anthropic API: it
# re-measures against a live model, refreshes recordings/history/chart,
# and OPENS A PR with the result. Nothing is committed to main directly —
# the replay pin (bench_replay_test.exs) validates every refresh on its
# own PR before it lands, and the trend line grows one point per merge.
#
# Requires the ANTHROPIC_API_KEY repo secret and the repo setting
# "Allow GitHub Actions to create and approve pull requests"
# (Settings → Actions → General → Workflow permissions).

name: Writability Bench (live)

on:
  workflow_dispatch:
  schedule:
    # Mondays and Thursdays, 09:00 UTC. Secrets are never exposed to fork
    # PRs on these triggers. Dial the cadence here after the rc.5 soak.
    - cron: "0 9 * * 1,4"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: writability-bench-live
  cancel-in-progress: false

env:
  MIX_ENV: dev
  OTP_VERSION: "28.1"
  ELIXIR_VERSION: "1.19.5-otp-28"

jobs:
  bench:
    name: Live generate-compile-fix benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-dev-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-dev-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run the benchmark live
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: mix skein.bench -- --live --report bench_report.json

      - name: Upload report and refreshed recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: writability-bench
          path: |
            bench_report.json
            conformance/writability/recordings.json
            conformance/writability/history.jsonl
            docs/site/public/writability-history.svg

      # Land the refresh through a normal PR: the branch carries only the
      # benchmark outputs, and the PR's own CI (bench_replay_test.exs)
      # proves the new recordings replay deterministically before merge.
      - name: Open a refresh PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- conformance/writability docs/site/public/writability-history.svg; then
            echo "Benchmark outputs unchanged — nothing to land."
            exit 0
          fi

          SUMMARY="$(jq -r '.summary | "\(.green)/\(.tasks) green, \(.first_try)/\(.tasks) first-try, mean iterations \(.mean_iterations_to_green)"' bench_report.json)"
          BRANCH="bench/live-$(date -u +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add conformance/writability docs/site/public/writability-history.svg
          git commit -m "[bench] live writability run: $SUMMARY"
          git push -u origin "$BRANCH"

          {
            echo "Automated live run of the agent-writability benchmark (#320)."
            echo
            echo "**Result: $SUMMARY** (model: $(jq -r '.model' bench_report.json), trigger: ${{ github.event_name }})"
            echo
            echo "Refreshes \`conformance/writability/recordings.json\` + \`history.jsonl\` and regenerates the trend chart. This PR's CI replays the new recordings deterministically (\`bench_replay_test.exs\`) — a green run here is the proof the refresh is sound."
            echo
            echo "Full report in the \`writability-bench\` artifact on the triggering run."
          } > pr_body.md

          gh pr create --base main --head "$BRANCH" \
            --title "[bench] Live writability refresh: $SUMMARY" \
            --body-file pr_body.md
