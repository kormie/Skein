name: Build Skein CLI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  MIX_ENV: prod
  OTP_VERSION: "28.1"
  ELIXIR_VERSION: "1.19.5-otp-28"

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Build release
        run: mix release skein --overwrite

      - name: List build artifacts
        run: ls -lah burrito_out/

      - name: Upload Linux x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: skein-linux-x86_64
          path: burrito_out/skein_linux
          if-no-files-found: error

      - name: Upload macOS x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: skein-macos-x86_64
          path: burrito_out/skein_macos
          if-no-files-found: warn

      - name: Upload macOS aarch64 binary
        uses: actions/upload-artifact@v4
        with:
          name: skein-macos-aarch64
          path: burrito_out/skein_macos_arm
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/skein-linux-x86_64/skein_linux release/skein-linux-x86_64
          cp artifacts/skein-macos-x86_64/skein_macos release/skein-macos-x86_64 || true
          cp artifacts/skein-macos-aarch64/skein_macos_arm release/skein-macos-aarch64 || true
          chmod +x release/*
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
