name: Build Skein CLI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Only run on PRs that can affect the release build; docs-only PRs skip it
    paths:
      - "mix.exs"
      - "mix.lock"
      - "apps/**"
      - "config/**"
      - "rel/**"
      - "editors/vscode/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
  # Called by release.yml after it tags a version bump. A tag pushed with the
  # default GITHUB_TOKEN can't trigger the `tags: ["v*"]` path above, so the
  # release flow invokes this workflow directly with the tag to build.
  workflow_call:
    inputs:
      release_ref:
        description: "Tag (or ref) to check out, build, and release"
        required: false
        type: string
      is_release:
        description: "Create a GitHub Release for release_ref"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  # Cancel superseded runs only on PRs (e.g. rapid pushes to the same PR). On
  # main pushes, `v*` tags, and release workflow_call builds the group is unique
  # (run_id), so those always run to completion — an in-flight release build is
  # never cancelled by a later merge, so no version ships without its binaries.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  MIX_ENV: prod
  OTP_VERSION: "28.1"
  ELIXIR_VERSION: "1.19.5-otp-28"

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - name: Set up Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      # PRs only smoke-test the release path (prod compile + assembly +
      # Burrito wrap) with the native target; main and tags build all four.
      - name: Limit PR builds to the native Linux target
        if: github.event_name == 'pull_request'
        run: echo "BURRITO_TARGET=linux" >> "$GITHUB_ENV"

      - name: Build release
        run: mix release skein --overwrite

      - name: List build artifacts
        run: ls -lah burrito_out/

      - name: Upload Linux x86_64 binary
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: skein-linux-x86_64
          path: burrito_out/skein_linux
          if-no-files-found: error

      - name: Upload Linux aarch64 binary
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: skein-linux-aarch64
          path: burrito_out/skein_linux_arm
          if-no-files-found: warn

      - name: Upload macOS x86_64 binary
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: skein-macos-x86_64
          path: burrito_out/skein_macos
          if-no-files-found: warn

      - name: Upload macOS aarch64 binary
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: skein-macos-aarch64
          path: burrito_out/skein_macos_arm
          if-no-files-found: warn

  build-extension:
    name: Build VS Code extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Package extension
        working-directory: editors/vscode
        run: |
          npm ci
          npx vsce package -o skein-vscode.vsix

      - name: Upload extension
        uses: actions/upload-artifact@v7
        with:
          name: skein-vscode-extension
          path: editors/vscode/skein-vscode.vsix
          if-no-files-found: error

  # Build the published docs site for this version and capture it as a release
  # asset: the full built site as a tarball plus the agent-readable llms*.txt
  # files, so every release carries its own version-pinned spec/docs. Only runs
  # when releasing (a `v*` tag push or release.yml's workflow_call).
  docs-snapshot:
    name: Build docs snapshot
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.is_release }}
    runs-on: ubuntu-latest
    env:
      # ex_doc is a dev-only dep; the rest of this workflow runs in prod.
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - name: Set up Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Build API reference (ExDoc)
        run: mix docs

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build docs site
        working-directory: docs/site
        run: |
          bun install
          bunx astro build

      - name: Package docs snapshot
        run: |
          set -euo pipefail
          mkdir -p docs-snapshot
          tar -czf docs-snapshot/skein-docs-site.tar.gz -C docs/site/dist .
          # starlight-llms-txt emits these at the site root (docs/site/dist).
          for f in llms.txt llms-full.txt llms-small.txt; do
            match="$(find docs/site/dist -name "$f" -print -quit)"
            if [ -z "$match" ]; then
              echo "::error::Expected $f in docs/site/dist but it was not generated"
              exit 1
            fi
            cp "$match" "docs-snapshot/$f"
          done
          ls -lah docs-snapshot

      - name: Upload docs snapshot
        uses: actions/upload-artifact@v7
        with:
          name: skein-docs-snapshot
          path: docs-snapshot/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build, build-extension, docs-snapshot]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.is_release }}
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/skein-linux-x86_64/skein_linux release/skein-linux-x86_64
          cp artifacts/skein-linux-aarch64/skein_linux_arm release/skein-linux-aarch64 || true
          cp artifacts/skein-macos-x86_64/skein_macos release/skein-macos-x86_64 || true
          cp artifacts/skein-macos-aarch64/skein_macos_arm release/skein-macos-aarch64 || true
          cp artifacts/skein-vscode-extension/skein-vscode.vsix release/skein-vscode.vsix
          # Version-pinned docs snapshot (built site + agent-readable llms*.txt).
          cp artifacts/skein-docs-snapshot/skein-docs-site.tar.gz release/skein-docs-site.tar.gz
          cp artifacts/skein-docs-snapshot/llms.txt release/llms.txt
          cp artifacts/skein-docs-snapshot/llms-full.txt release/llms-full.txt
          cp artifacts/skein-docs-snapshot/llms-small.txt release/llms-small.txt
          chmod +x release/skein-*64
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_ref || github.ref_name }}
          generate_release_notes: true
          files: release/*
