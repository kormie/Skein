name: Sync milestones

# Milestones-as-code: .github/milestones.json is the source of truth.
# Creates any listed milestone that doesn't exist, refreshes the title,
# description, and state of ones that do, and renames milestones whose
# entry lists the old name in previous_titles. Never deletes milestones.
on:
  push:
    paths:
      - ".github/milestones.json"
      - ".github/workflows/milestones.yml"
  workflow_dispatch:

permissions:
  contents: read # checkout of a private repo fails without this once permissions are declared
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync milestones
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/milestones?state=all&per_page=100")
          jq -c '.[]' .github/milestones.json | while read -r wanted; do
            title=$(jq -r '.title' <<<"$wanted")
            desc=$(jq -r '.description' <<<"$wanted")
            state=$(jq -r '.state // "open"' <<<"$wanted")
            number=$(jq -r --arg t "$title" '[.[] | select(.title == $t)][0].number // empty' <<<"$existing")
            if [ -z "$number" ]; then
              while IFS= read -r prev; do
                [ -n "$number" ] && continue
                number=$(jq -r --arg t "$prev" '[.[] | select(.title == $t)][0].number // empty' <<<"$existing")
              done < <(jq -r '.previous_titles // [] | .[]' <<<"$wanted")
            fi
            if [ -n "$number" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/milestones/${number}" \
                -f title="$title" -f description="$desc" -f state="$state" >/dev/null
              echo "updated milestone #${number}: ${title} (${state})"
            else
              created=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/milestones" \
                -f title="$title" -f description="$desc" -f state="$state")
              echo "created milestone #$(jq -r '.number' <<<"$created"): ${title} (${state})"
            fi
          done
