name: Deploy docs
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28.1'
          elixir-version: '1.19.5'
      - run: mix deps.get
      - run: mix docs
        env:
          MIX_ENV: dev
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: docs/site
      - run: bunx astro build
        working-directory: docs/site
      # Serve the installer at https://kormie.github.io/Skein/install.sh
      # (single source: /install.sh in the repo root)
      - run: cp install.sh docs/site/dist/install.sh
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
