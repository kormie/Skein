name: Docs PR check
on:
  pull_request:
    paths:
      - 'docs/site/**'
      - '.docs-config.json'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: docs/site
      - run: bunx astro build
        working-directory: docs/site
